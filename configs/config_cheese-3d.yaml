data:
  image_resize_dims:
    height: 256
    width: 256
  data_dir: /teamspace/studios/data/cheese-3d
  video_dir: /teamspace/studios/data/cheese-3d/videos
  camera_params_file: /teamspace/studios/data/cheese-3d/calibrations.csv
  csv_file: CollectedData.csv

  view_names:
    - BC
    - L
    - R
    - TC
    - TL
    - TR
  num_keypoints: 28
  keypoint_names:
    # Order matches CollectedData.csv bodyparts row (column order)
    - ref(head-post)
    - lowerlip
    - upperlip(left)
    - upperlip(right)
    - nose(bottom)
    - nose(tip)
    - nose(top)
    - eye(front)(left)
    - eye(top)(left)
    - eye(back)(left)
    - eye(bottom)(left)
    - ear(base)(left)
    - ear(top)(left)
    - ear(tip)(left)
    - ear(bottom)(left)
    - pad(top)(left)
    - pad(side)(left)
    - pad(center)
    - eye(front)(right)
    - eye(top)(right)
    - eye(back)(right)
    - eye(bottom)(right)
    - ear(base)(right)
    - ear(top)(right)
    - ear(tip)(right)
    - ear(bottom)(right)
    - pad(top)(right)
    - pad(side)(right)
  columns_for_singleview_pca: []
  skeleton:
    # nose center
    - [4, 5]   # nose(bottom) -> nose(tip)
    - [5, 6]   # nose(tip) -> nose(top)
    - [5, 17]  # nose(tip) -> pad(center)
    # left nose pad (closed triangle)
    - [17, 15]  # pad(center) -> pad(top)(left)
    - [15, 16]  # pad(top)(left) -> pad(side)(left)
    - [16, 17]  # pad(side)(left) -> pad(center)
    # right nose pad (closed triangle)
    - [17, 26]  # pad(center) -> pad(top)(right)
    - [26, 27]  # pad(top)(right) -> pad(side)(right)
    - [27, 17]  # pad(side)(right) -> pad(center)
    # mouth (closed triangle)
    - [1, 2]   # lowerlip -> upperlip(left)
    - [2, 3]   # upperlip(left) -> upperlip(right)
    - [3, 1]   # upperlip(right) -> lowerlip
    # left eye (closed quadrilateral)
    - [7, 8]   # eye(front)(left) -> eye(top)(left)
    - [8, 9]   # eye(top)(left) -> eye(back)(left)
    - [9, 10]  # eye(back)(left) -> eye(bottom)(left)
    - [10, 7]  # eye(bottom)(left) -> eye(front)(left)
    # right eye (closed quadrilateral)
    - [18, 19]  # eye(front)(right) -> eye(top)(right)
    - [19, 20]  # eye(top)(right) -> eye(back)(right)
    - [20, 21]  # eye(back)(right) -> eye(bottom)(right)
    - [21, 18]  # eye(bottom)(right) -> eye(front)(right)
    # left ear (closed quadrilateral)
    - [11, 12]  # ear(base)(left) -> ear(top)(left)
    - [12, 13]  # ear(top)(left) -> ear(tip)(left)
    - [13, 14]  # ear(tip)(left) -> ear(bottom)(left)
    - [14, 11]  # ear(bottom)(left) -> ear(base)(left)
    # right ear (closed quadrilateral)
    - [22, 23]  # ear(base)(right) -> ear(top)(right)
    - [23, 24]  # ear(top)(right) -> ear(tip)(right)
    - [24, 25]  # ear(tip)(right) -> ear(bottom)(right)
    - [25, 22]  # ear(bottom)(right) -> ear(base)(right)

training:
  imgaug: dlc
  train_batch_size: 16
  val_batch_size: 48
  test_batch_size: 48
  train_prob: 0.95
  val_prob: 0.05
  train_frames: 1
  num_gpus: 1
  num_workers: 4
  early_stop_patience: 3
  unfreezing_epoch: 20
  min_epochs: 300
  max_epochs: 300
  log_every_n_steps: 10
  check_val_every_n_epoch: 5
  rng_seed_data_pt: 0
  rng_seed_model_pt: 0
  optimizer: Adam
  optimizer_params:
    learning_rate: 0.00005
  lr_scheduler: multisteplr
  lr_scheduler_params:
    multisteplr:
      milestones: [150, 200, 250]
      gamma: 0.5
  uniform_heatmaps_for_nan_keypoints: true

model:
  losses_to_use: []
  backbone: vitb_dinov2 #resnet50_animal_ap10k
  model_type: heatmap
  heatmap_loss_type: mse
  model_name: test

dali:
  general:
    seed: 123456
  base:
    train:
      sequence_length: 64
    predict:
      sequence_length: 192
  context:
    train:
      batch_size: 32
    predict:
      sequence_length: 192

losses:
  pca_singleview:
    log_weight: 5.0
    components_to_keep: 0.99
    epsilon: null
  temporal:
    log_weight: 5.0
    epsilon: 10.0
    prob_threshold: 0.05

eval:
  # paths to the hydra config files in the output folder, OR absolute paths to such folders.
  hydra_paths: [" "]
  # predict?
  predict_vids_after_training: false
  # save .mp4?
  save_vids_after_training: false
  # str with an absolute path to a directory containing videos for prediction.
  # (it's not absolute just for the toy example)
  # test_videos_directory: "/media/mattw/behavior/pose-estimation-data-final/cheese-2d/videos_test"
  # str with an absolute path to directory in which you want to save .csv with predictions
  saved_vid_preds_dir: null
  # create labeled video from each video in test_videos_directory
  create_labeled_video: true
  # confidence threshold for plotting a vid
  confidence_thresh_for_vid: 0.05
  # str with absolute path to the video file you want plotted with keypoints
  video_file_to_plot: ""
  # a list of strings, each points to a .csv file with predictions of a given model to the same video. will be combined with video_file_to_plot to make a visualization
  pred_csv_files_to_plot: [" "]

callbacks:
  anneal_weight:
    attr_name: "total_unsupervised_importance"
    init_val: 0.0
    increase_factor: 0.01
    final_val: 1.0
    freeze_until_epoch: 0

